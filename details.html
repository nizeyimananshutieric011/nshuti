<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Details - XE Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>💱 XE Clone</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="converter.html" class="nav-link">Converter</a>
                <a href="details.html" class="nav-link active">Details</a>
                <a href="history.html" class="nav-link">History</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </nav>
            <div class="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="details-section">
            <h2>Currency Details</h2>
            
            <div class="currency-selector">
                <label for="detail-currency">Select Currency:</label>
                <select id="detail-currency">
                    <option value="">Choose a currency</option>
                </select>
            </div>

            <div id="currency-info" class="currency-info" style="display: none;">
                <div class="currency-header">
                    <div class="currency-flag" id="currency-flag"></div>
                    <div class="currency-title">
                        <h3 id="currency-name"></h3>
                        <p id="currency-code"></p>
                    </div>
                </div>

                <div class="currency-stats">
                    <div class="stat-card">
                        <h4>Current Rate (USD)</h4>
                        <p id="current-rate-usd"></p>
                    </div>
                    <div class="stat-card">
                        <h4>Change (24h)</h4>
                        <p id="change-24h"></p>
                    </div>
                    <div class="stat-card">
                        <h4>Volume (24h)</h4>
                        <p id="volume-24h"></p>
                    </div>
                </div>

                <div class="chart-section">
                    <h4>Exchange Rate Trends</h4>
                    <div class="chart-container">
                        <canvas id="rate-chart"></canvas>
                    </div>
                    <div class="chart-controls">
                        <button class="chart-btn active" data-period="7">7 Days</button>
                        <button class="chart-btn" data-period="30">30 Days</button>
                        <button class="chart-btn" data-period="90">90 Days</button>
                    </div>
                </div>

                <div class="comparison-section">
                    <h4>Comparison with Other Currencies</h4>
                    <div class="comparison-grid" id="comparison-grid">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div class="historical-section">
                    <h4>Historical Rates</h4>
                    <div class="historical-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Rate to USD</th>
                                    <th>Change</th>
                                </tr>
                            </thead>
                            <tbody id="historical-data">
                                <!-- Dynamically populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 XE Clone Currency Exchange. Educational Project.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
