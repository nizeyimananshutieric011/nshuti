<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>💱 Currency Exchange</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="converter.html" class="nav-link active">Converter</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="converter-section">
            <h2>Currency Converter</h2>
            
            <div class="converter-card">
                <div class="converter-form">
                    <div class="input-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01" required>
                    </div>

                    <div class="currency-row">
                        <div class="input-group">
                            <label for="from-currency">From</label>
                            <select id="from-currency" required>
                                <option value="">Select currency</option>
                            </select>
                        </div>

                        <button id="swap-btn" class="swap-btn">⇄</button>

                        <div class="input-group">
                            <label for="to-currency">To</label>
                            <select id="to-currency" required>
                                <option value="">Select currency</option>
                            </select>
                        </div>
                    </div>

                    <button id="convert-btn" class="convert-btn">Convert</button>
                </div>

                <div id="result-section" class="result-section" style="display: none;">
                    <div class="result-amount">
                        <span id="from-amount-display"></span>
                        <span id="from-currency-display"></span>
                        <span>=</span>
                        <span id="to-amount-display" class="converted-amount"></span>
                        <span id="to-currency-display"></span>
                    </div>
                    
                    <div class="exchange-rate-info">
                        <p><strong>Exchange Rate:</strong> <span id="exchange-rate"></span></p>
                        <p><strong>Last Updated:</strong> <span id="timestamp"></span></p>
                    </div>

                    <button id="save-conversion-btn" class="save-btn">💾 Save to History</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Currency Exchange App. Educational Project.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
